<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СЕТЕВОЙ НАГРУЗОЧНЫЙ ТЕСТ — качаем тонны трафика</title>
    <link rel="stylesheet" href="large.css">
    <!-- Подключаем ТЯЖЁЛЫЙ ШРИФТ (Google Fonts с жирным весом) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Дополнительный тяжёлый шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🌐 СЕТЕВОЙ СТРЕСС-ТЕСТ</h1>
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3>Загружено данных</h3>
                <div class="stat-value" id="totalLoaded">0</div>
                <div class="stat-unit">MB</div>
            </div>
            <div class="stat-card">
                <h3>Запросов выполнено</h3>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
            <div class="stat-card">
                <h3>Активных загрузок</h3>
                <div class="stat-value" id="activeDownloads">0</div>
            </div>
        </div>

        <div class="controls">
            <button id="startLoadBtn" class="btn btn-primary">🚀 СТАРТ — НАГРУЗИТЬ СЕТЬ</button>
            <button id="stopLoadBtn" class="btn btn-danger">🛑 СТОП — ОСТАНОВИТЬ</button>
            <button id="clearCacheBtn" class="btn btn-warning">🗑️ ОЧИСТИТЬ КЭШ (перезагрузить)</button>
        </div>

        <!-- ЗОНА ДЛЯ ВСЕХ ЗАГРУЖАЕМЫХ МЕДИАФАЙЛОВ -->
        <div id="mediaZone" class="media-zone"></div>

        <!-- ЛОГ ЗАГРУЗОК -->
        <div class="log-panel">
            <h3>📡 ЛОГ СЕТЕВЫХ ЗАПРОСОВ</h3>
            <div id="logList" class="log-list"></div>
        </div>
    </div>

    <script src="large.js"></script>
</body>
</html>
